<section class="flex flex-col w-full gap-2">
  <div>
    <label
      class="text-[10px] uppercase tracking-wider font-bold text-slate-500 flex items-center gap-2 mb-2"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="size-4"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"
        />
      </svg>
      Context Padding
    </label>
    <div class="flex items-center bg-white/5 p-2 rounded border border-white/5">
      <input
        type="range"
        min="0"
        max="5"
        step="0.5"
        class="flex-1 min-w-0 accent-cyan-500"
        [(ngModel)]="settings.contextPadding"
      />
      <span class="text-[10px] font-mono text-cyan-400 w-12 shrink-0 text-right">
        {{ settings.contextPadding() }}s
      </span>
    </div>
  </div>

  <div>
    <label
      class="text-[10px] uppercase tracking-wider font-bold text-slate-500 flex items-center gap-2 mb-2"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="size-4"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z"
        />
      </svg>
      Volume Boost
    </label>
    <div class="flex items-center bg-white/5 p-2 rounded border border-white/5">
      <input
        type="range"
        min="0.5"
        max="25"
        step="0.5"
        class="flex-1 min-w-0 accent-cyan-500"
        [(ngModel)]="settings.audioGain"
      />
      <span class="text-[10px] font-mono text-cyan-400 w-12 shrink-0 text-right">
        {{ settings.audioGain().toFixed(1) }}x
      </span>
    </div>
  </div>

  <div>
    <label
      class="text-[10px] uppercase tracking-wider font-bold text-slate-500 flex items-center gap-2 mb-2"
    >
      <svg
        fill="#000000"
        width="800px"
        height="800px"
        stroke="currentColor"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
        class="size-4"
      >
        <path
          d="M1,16V8A1,1,0,0,1,3,8v8a1,1,0,0,1-2,0Zm7,4V4A1,1,0,0,0,6,4V20a1,1,0,0,0,2,0Zm5,2V2a1,1,0,0,0-2,0V22a1,1,0,0,0,2,0Zm5-2V4a1,1,0,0,0-2,0V20a1,1,0,0,0,2,0ZM22,7a1,1,0,0,0-1,1v8a1,1,0,0,0,2,0V8A1,1,0,0,0,22,7Z"
        />
      </svg>
      Waveform Scale
    </label>
    <div class="flex items-center bg-white/5 p-2 rounded border border-white/5">
      <input
        type="range"
        min="0.5"
        max="50"
        step="0.5"
        class="flex-1 min-w-0 accent-cyan-500"
        [(ngModel)]="settings.visualScale"
      />
      <span class="text-[10px] font-mono text-cyan-400 w-12 shrink-0 text-right">
        {{ settings.visualScale().toFixed(1) }}x
      </span>
    </div>
  </div>

  <div>
    <label
      class="text-[10px] uppercase tracking-wider font-bold text-slate-500 flex items-center gap-2 mb-2"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="size-4"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456ZM16.894 20.567 16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423Z"
        />
      </svg>
      Spec Contrast
    </label>
    <div class="flex items-center bg-white/5 p-2 rounded border border-white/5">
      <input
        type="range"
        min="0.5"
        max="5"
        step="0.5"
        class="flex-1 min-w-0 accent-cyan-500"
        [(ngModel)]="settings.spectrogramContrast"
      />
      <span class="text-[10px] font-mono text-cyan-400 w-12 shrink-0 text-right">
        {{ settings.spectrogramContrast().toFixed(1) }}x
      </span>
    </div>
  </div>

  <label
    class="flex items-center justify-between cursor-pointer group bg-white/5 p-2 rounded border border-white/5"
  >
    <div class="flex flex-row gap-0.5">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="size-4"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"
        />
      </svg>
      <span
        class="text-[10px] font-bold uppercase tracking-wider text-slate-500 group-hover:text-white transition-colors"
      >
        Auto-play audio
      </span>
    </div>
    <div class="relative flex items-center">
      <input type="checkbox" [(ngModel)]="settings.autoPlay" class="sr-only" />
      <div
        class="block w-8 h-4 outline-none rounded-full transition-colors"
        [ngClass]="settings.autoPlay() ? 'bg-cyan-500/50' : 'bg-white/10'"
      ></div>
      <div
        class="absolute left-0.5 top-0.5 bg-white w-3 h-3 rounded-full transition-transform"
        [class.translate-x-4]="settings.autoPlay()"
      ></div>
    </div>
  </label>
</section>
