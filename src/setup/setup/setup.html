<div
  class="flex flex-col items-center justify-center min-h-screen bg-[#0a0a0c] bg-[radial-gradient(circle_at_50%_0%,_rgba(6,182,212,0.08)_0%,_transparent_50%)] p-6 text-slate-300 font-sans"
>
  <div
    class="max-w-xl w-full bg-black/60 backdrop-blur-md border border-white/5 rounded-xl p-8 shadow-2xl"
  >
    <div class="flex items-center gap-2 mb-4">
      <div class="w-3 h-3 rounded-full bg-cyan-500 shadow-[0_0_8px_rgba(6,182,212,0.6)]"></div>
      <span class="text-[10px] uppercase tracking-widest font-bold text-white"
        >BDP - Label verfier</span
      >
    </div>
    <h1 class="text-3xl font-medium tracking-tight text-white mb-2">Audio Label Verifier</h1>
    <p class="text-sm text-slate-400 mb-8 font-mono">
      Upload your FLAC audio and TXT labels to start verifying.
    </p>

    <div class="space-y-6">
      <div class="flex flex-col gap-2">
        <label class="text-xs uppercase tracking-wider font-semibold text-slate-500"
          >Audio File (.flac, .wav)</label
        >
        <app-file-input accept="audio/*" [(selectedFile)]="audioFile"></app-file-input>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-xs uppercase tracking-wider font-semibold text-slate-500"
          >Labels File (.txt)</label
        >
        <app-file-input accept=".txt" [(selectedFile)]="textFile"></app-file-input>
      </div>

      @if (error()) {
        <div
          class="bg-rose-600/20 border border-rose-600/40 text-rose-400 px-4 py-3 rounded-lg text-sm font-mono"
        >
          {{ error() }}
        </div>
      }

      <button
        [disabled]="disableButton()"
        (click)="processAudio()"
        class="w-full mt-4 flex items-center justify-center gap-2 bg-cyan-500 hover:bg-cyan-400 disabled:opacity-50 disabled:cursor-not-allowed text-black py-4 px-4 rounded text-[11px] font-bold uppercase tracking-widest shadow-[0_0_20px_rgba(6,182,212,0.3)] transition-all"
      >
          @if (isProcessing()) {
            <span class="flex items-center gap-2">
              <div class="w-4 h-4 border-2 border-black/20 border-t-black rounded-full animate-spin"></div>
              Processing Audio
            </span>
          }@else {
            <div class="flex flex-row gap-2">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              class="size-4 stroke-2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"
              />
            </svg>
            Initialize Environment
          </div>
          }
      </button>
    </div>
  </div>
</div>
